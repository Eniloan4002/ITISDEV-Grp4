<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard &mdash; AM Restaurant RMIS</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>AM Restaurant &mdash; RMIS</h1>
      <p class="subtitle" id="greeting">Loading&hellip;</p>
    </header>

    <section>
      <h2>Modules</h2>
      <ul class="module-list" id="module-list"></ul>
    </section>

    <div class="actions">
      <button type="button" id="logout-btn">Logout</button>
    </div>
  </main>

  <script>
    // Module links and the roles allowed to see each (SI-10). Mirrors the
    // server-side PROTECTED_PAGES / ROLE_PAGES — but the server gate is the real
    // enforcement; this only hides links a role cannot reach.
    const MODULES = [
      { href: '/login.html',          label: 'Login (SI-7)',                               roles: ['Admin', 'Manager', 'Cashier', 'Staff'] },
      { href: '/profile.html',        label: 'My Profile (SI-9)',                          roles: ['Admin', 'Manager', 'Cashier', 'Staff'] },
      { href: '/register.html',       label: 'Create User Account &mdash; Registration (SI-6)', roles: ['Admin'] },
      { href: '/admin-settings.html', label: 'Admin Settings (SI-10)',                     roles: ['Admin'] },
    ];

    function renderModules(role) {
      const list = document.getElementById('module-list');
      list.innerHTML = '';
      for (const m of MODULES) {
        if (!m.roles.includes(role)) continue;
        const li = document.createElement('li');
        const a = document.createElement('a');
        a.href = m.href;
        a.innerHTML = m.label;
        li.appendChild(a);
        list.appendChild(li);
      }
    }

    // Role-aware landing page (SI-7/SI-10).
    (async () => {
      try {
        const res = await fetch('/api/me');
        if (res.status === 401) {
          window.location = '/login.html';
          return;
        }
        const data = await res.json();
        document.getElementById('greeting').textContent =
          `Welcome, ${data.fullName} (${data.role})`;
        renderModules(data.role);
      } catch (err) {
        window.location = '/login.html';
      }
    })();

    document.getElementById('logout-btn').addEventListener('click', async () => {
      try {
        await fetch('/api/logout', { method: 'POST' });
      } finally {
        window.location = '/login.html';
      }
    });
  </script>
</body>
</html>
