<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingredient Inventory &mdash; AM Restaurant RMIS</title>
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body class="app">
  <header class="topbar">
    <div class="topbar-brand"><a href="/dashboard">AM <span>RMIS</span></a></div>
    <nav class="topbar-nav">
      <a class="topbar-link" href="/profile">My Profile</a>
      <span class="user-name" id="user-name">&hellip;</span>
      <span class="role-badge" id="user-role">&hellip;</span>
      <button type="button" class="btn-logout" id="logout-btn">Logout</button>
    </nav>
  </header>

  <div class="app-body">
    <aside class="sidebar">
      <a class="side-back" href="/dashboard">&larr; All apps</a>
      <div class="side-section">Inventory</div>
      <a class="side-link is-active" href="/inventory">Ingredient Inventory</a>
      <a class="side-link" href="/stock-alerts">Stock Alerts</a>
      <a class="side-link" id="nav-adjust" href="/stock-adjustment">Stock Adjustment</a>
      <a class="side-link" id="nav-po" href="/purchase-orders">Purchase Orders</a>
    </aside>

    <main class="content">
      <div class="page-head">
        <h1>Ingredient Inventory</h1>
        <span class="pill pill-live">Live</span>
      </div>

      <!-- Low-stock notification banner (AC: managers see a banner for low items). -->
      <div class="notice notice-warn" id="lowstock-notice" hidden></div>
      <div class="notice" id="page-notice" hidden></div>

      <section class="kpi-row" id="kpi-row"></section>

      <div class="toolbar">
        <div class="field-inline grow">
          <label for="f-search">Search</label>
          <input class="rmis-input" id="f-search" type="search" placeholder="Ingredient name&hellip;">
        </div>
        <div class="field-inline">
          <label for="f-category">Category</label>
          <select class="rmis-select" id="f-category"><option value="">All categories</option></select>
        </div>
        <div class="field-inline">
          <label for="f-supplier">Supplier</label>
          <select class="rmis-select" id="f-supplier"><option value="">All suppliers</option></select>
        </div>
        <div class="spacer"></div>
        <button class="btn-primary" id="btn-new">+ New Ingredient</button>
      </div>

      <div class="card">
        <div class="card-head">Ingredients</div>
        <table class="mock">
          <thead>
            <tr>
              <th>Name</th><th>Category</th><th>Supplier</th><th>Unit</th>
              <th class="num">On hand</th><th class="num">Reorder</th>
              <th>Expiration</th><th>Status</th><th>Actions</th>
            </tr>
          </thead>
          <tbody id="inv-body"></tbody>
        </table>
        <div class="empty-state" id="inv-empty" hidden>No ingredients match. Add one with &ldquo;New Ingredient&rdquo;.</div>
      </div>
    </main>
  </div>

  <!-- Generic modal shell, filled by inventory.js. -->
  <div class="modal-overlay" id="modal" hidden><div class="modal" id="modal-card"></div></div>

  <script src="/js/rmis-modules.js"></script>
  <script src="/js/rmis-ui.js"></script>
  <script src="/js/inventory.js"></script>
</body>
</html>
