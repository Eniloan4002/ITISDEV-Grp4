<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingredient Inventory - AM Restaurant RMIS</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="container container-wide">
    <header class="page-header">
      <h1>Ingredient Inventory</h1>
      <p class="subtitle">Current ingredient stock levels and reorder status.</p>
    </header>

    <p id="form-message" class="form-message" role="alert" hidden></p>

    <section>
      <div class="table-wrap">
        <table class="data-table" aria-describedby="inventory-help">
          <thead>
            <tr>
              <th>Ingredient</th>
              <th>Type</th>
              <th>Current Qty</th>
              <th>Unit</th>
              <th>Reorder Level</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="inventory-body">
            <tr>
              <td colspan="6" class="muted">Loading inventory...</td>
            </tr>
          </tbody>
        </table>
      </div>
      <p id="inventory-help" class="field-hint">Only Admin and Manager roles can access this page.</p>
    </section>

    <div class="actions">
      <a href="/dashboard" class="cancel-link">&larr; Back to dashboard</a>
    </div>
  </main>

  <script src="/js/inventory.js"></script>
</body>
</html>
