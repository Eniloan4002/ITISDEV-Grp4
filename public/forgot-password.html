<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password &mdash; AM Restaurant RMIS</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>Forgot Password</h1>
      <p class="subtitle">Enter your email and we'll generate a reset link.</p>
    </header>

    <!-- Page-level message (success or general error). Hidden until set by JS. -->
    <p id="form-message" class="form-message" role="alert" hidden></p>

    <form id="forgot-form" novalidate>
      <div class="field">
        <label for="email">Your Email</label>
        <input type="email" id="email" name="email" autocomplete="off" required autofocus>
        <span class="field-error" id="error-email"></span>
      </div>

      <div class="actions">
        <button type="submit" id="submit-btn">Send Reset Link</button>
        <a href="/login.html" class="cancel-link">Back to Login</a>
      </div>
    </form>

    <!-- The generated reset link is shown here (MVP delivery: on-screen + console). -->
    <div id="reset-link-box" hidden></div>
  </main>

  <script src="/js/forgot-password.js"></script>
</body>
</html>
