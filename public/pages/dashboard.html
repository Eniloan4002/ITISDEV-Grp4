<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard &mdash; AM Restaurant RMIS</title>
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body class="app">
  <!-- Shared top bar (hydrated by rmis-modules.js from /api/me). -->
  <header class="topbar">
    <div class="topbar-brand"><a href="/dashboard">AM <span>RMIS</span></a></div>
    <nav class="topbar-nav">
      <a class="topbar-link" href="/profile">My Profile</a>
      <span class="user-name" id="user-name">&hellip;</span>
      <span class="role-badge" id="user-role">&hellip;</span>
      <button type="button" class="btn-logout" id="logout-btn">Logout</button>
    </nav>
  </header>

  <main class="home">
    <div class="home-head">
      <h1 id="greeting">Welcome&hellip;</h1>
      <p class="subtitle">Restaurant Management Information System</p>
    </div>

    <!-- KPI stat tiles (placeholder demo figures). -->
    <section class="kpi-row" id="kpi-row"></section>

    <!-- Module app grid (role-filtered). -->
    <h2 class="section-title">Modules</h2>
    <section class="app-grid" id="app-grid"></section>

    <!-- Administration (Admin only; removed for other roles). -->
    <section id="admin-section">
      <h2 class="section-title">Administration</h2>
      <div class="app-grid" id="admin-grid"></div>
    </section>
  </main>

  <script src="/js/rmis-modules.js"></script>
  <script src="/js/dashboard.js"></script>
</body>
</html>
