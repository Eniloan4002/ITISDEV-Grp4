<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login &mdash; AM Restaurant RMIS</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>AM Restaurant</h1>
      <p class="subtitle">Enter your Employee ID to start your shift.</p>
    </header>

    <!-- Page-level message (error or notice). Hidden until set. -->
    <p id="form-message" class="form-message" role="alert" hidden></p>

    <form id="login-form" method="POST" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="off" required autofocus>
        <span class="field-error" id="error-email"></span>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="off" required>
        <label class="field show-password" for="toggle-password">
          <input type="checkbox" id="toggle-password"> Show password
        </label>
        <span class="field-error" id="error-password"></span>
      </div>

      <div class="actions">
        <button type="submit" id="submit-btn">Login</button>
        <a href="/" class="cancel-link">Cancel</a>
      </div>

      <p class="field-hint"><a href="/forgot-password">Forgot Password?</a></p>
    </form>
  </main>

  <script src="/js/login.js"></script>
</body>
</html>
