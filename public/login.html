<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login &mdash; AM Restaurant RMIS</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>AM Restaurant</h1>
      <p class="subtitle">Enter your Employee ID to start your shift.</p>
    </header>

    <!-- Page-level message (error or notice). Hidden until set. -->
    <p id="form-message" class="form-message" role="alert" hidden></p>

    <form id="login-form" action="#" method="POST" novalidate>
      <div class="field">
        <label for="employee-id">Employee ID or Email</label>
        <input type="text" id="employee-id" name="employee-id" autocomplete="off" required autofocus>
        <span class="field-error" id="error-employee-id"></span>
      </div>

      <div class="field">
        <label for="password">PIN / Password</label>
        <input type="password" id="password" name="password" autocomplete="off" required>
        <span class="field-error" id="error-password"></span>
      </div>

      <div class="actions">
        <button type="submit" id="submit-btn">Login</button>
        <a href="/index.html" class="cancel-link">Cancel</a>
      </div>
    </form>
  </main>
</body>
</html>
