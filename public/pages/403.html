<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>403 &mdash; Unauthorized Access</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>403 &mdash; Unauthorized Access</h1>
      <p class="subtitle">You do not have permission to view this page.</p>
    </header>

    <section>
      <p class="muted">Your role is not allowed to access this resource. If you
      believe this is a mistake, contact an administrator.</p>
    </section>

    <div class="actions">
      <a href="/dashboard" class="cancel-link">&larr; Back to dashboard</a>
      <a href="/login" class="cancel-link">Log in as another user</a>
    </div>
  </main>
</body>
</html>
