<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password &mdash; AM Restaurant RMIS</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>Reset Password</h1>
      <p class="subtitle">Set a new password for your account.</p>
    </header>

    <!-- The reset token is read from the URL query string (?token=...) by JS. -->

    <!-- Page-level message (success or general error). Hidden until set by JS. -->
    <p id="form-message" class="form-message" role="alert" hidden></p>

    <form id="reset-form" novalidate>
      <div class="field">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" name="newPassword" autocomplete="off" required autofocus>
        <span class="field-hint">At least 8 characters, including letters and numbers.</span>
        <span class="field-error" id="error-newPassword"></span>
      </div>

      <div class="actions">
        <button type="submit" id="submit-btn">Set New Password</button>
        <a href="/login.html" class="cancel-link">Back to Login</a>
      </div>
    </form>
  </main>

  <script src="/js/reset-password.js"></script>
</body>
</html>
