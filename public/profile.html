<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile &mdash; AM Restaurant RMIS</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <main class="container">
    <header class="page-header">
      <h1>My Profile</h1>
      <p class="subtitle">Update your display name and contact number.</p>
    </header>

    <!-- Page-level message (success or general error). Hidden until set by JS. -->
    <p id="form-message" class="form-message" role="alert" hidden></p>

    <form id="profile-form" novalidate>
      <div class="field">
        <label for="fullName">Display Name</label>
        <input type="text" id="fullName" name="fullName" autocomplete="off" required>
        <span class="field-error" id="error-fullName"></span>
      </div>

      <div class="field">
        <label for="contactNumber">Contact Number</label>
        <input type="text" id="contactNumber" name="contactNumber" autocomplete="off" required>
        <span class="field-error" id="error-contactNumber"></span>
      </div>

      <div class="field">
        <label for="email">Email (read-only)</label>
        <input type="email" id="email" name="email" readonly disabled>
      </div>

      <div class="field">
        <label for="role">Role (read-only)</label>
        <input type="text" id="role" name="role" readonly disabled>
      </div>

      <div class="actions">
        <button type="submit" id="submit-btn">Save</button>
        <a href="/dashboard.html" class="cancel-link">Back to Dashboard</a>
      </div>
    </form>
  </main>

  <script src="/js/profile.js"></script>
</body>
</html>
