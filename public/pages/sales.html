<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales &amp; Billing &mdash; AM Restaurant RMIS</title>
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body class="app">
  <header class="topbar">
    <div class="topbar-brand"><a href="/dashboard">AM <span>RMIS</span></a></div>
    <nav class="topbar-nav">
      <a class="topbar-link" href="/profile">My Profile</a>
      <span class="user-name" id="user-name">&hellip;</span>
      <span class="role-badge" id="user-role">&hellip;</span>
      <button type="button" class="btn-logout" id="logout-btn">Logout</button>
    </nav>
  </header>

  <div class="app-body">
    <aside class="sidebar">
      <a class="side-back" href="/dashboard">&larr; All apps</a>
      <div class="side-section">Sales &amp; Billing</div>
      <a class="side-link is-active" href="/sales">Bills &amp; Receipts</a>
    </aside>

    <main class="content">
      <div class="page-head">
        <h1>Sales &amp; Billing</h1>
        <span class="pill pill-live">Live</span>
      </div>

      <div class="notice" id="page-notice" hidden></div>

      <section class="kpi-row" id="kpi-row"></section>

      <div class="toolbar">
        <div class="field-inline">
          <label for="f-status">Status</label>
          <select class="rmis-select" id="f-status">
            <option value="">All statuses</option>
            <option>Open</option><option>Paid</option><option>Void</option>
          </select>
        </div>
        <div class="field-inline">
          <label for="f-date">Date</label>
          <input class="rmis-input" id="f-date" type="date">
        </div>
        <div class="field-inline">
          <label>&nbsp;</label>
          <button class="btn-ghost" id="f-clear">Clear</button>
        </div>
        <div class="spacer"></div>
        <button class="btn-primary" id="btn-new">+ New Bill</button>
      </div>

      <div class="card">
        <div class="card-head">Bills</div>
        <table class="mock">
          <thead>
            <tr><th>Bill #</th><th>Table / Ref</th><th>Time</th><th>Cashier</th><th class="num">Total</th><th>Status</th><th></th></tr>
          </thead>
          <tbody id="sales-body"></tbody>
        </table>
        <div class="empty-state" id="sales-empty" hidden>No bills match. Start one with &ldquo;New Bill&rdquo;.</div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modal" hidden><div class="modal modal-wide" id="modal-card"></div></div>

  <script src="/js/rmis-modules.js"></script>
  <script src="/js/rmis-ui.js"></script>
  <script src="/js/sales.js"></script>
</body>
</html>
