<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Purchase Orders &mdash; AM Restaurant RMIS</title>
  <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body class="app">
  <header class="topbar">
    <div class="topbar-brand"><a href="/dashboard">AM <span>RMIS</span></a></div>
    <nav class="topbar-nav">
      <a class="topbar-link" href="/profile">My Profile</a>
      <span class="user-name" id="user-name">&hellip;</span>
      <span class="role-badge" id="user-role">&hellip;</span>
      <button type="button" class="btn-logout" id="logout-btn">Logout</button>
    </nav>
  </header>

  <div class="app-body">
    <aside class="sidebar">
      <a class="side-back" href="/dashboard">&larr; All apps</a>
      <div class="side-section">Inventory</div>
      <a class="side-link" href="/inventory">Ingredient Inventory</a>
      <a class="side-link" href="/stock-alerts">Stock Alerts</a>
      <a class="side-link" href="/stock-adjustment">Stock Adjustment</a>
      <a class="side-link is-active" href="/purchase-orders">Purchase Orders</a>
    </aside>

    <main class="content">
      <div class="page-head">
        <h1>Purchase Orders</h1>
        <span class="pill pill-live">Live</span>
      </div>

      <div class="notice" id="page-notice" hidden></div>

      <div class="toolbar">
        <div class="field-inline">
          <label for="f-supplier">Supplier</label>
          <select class="rmis-select" id="f-supplier"><option value="">All suppliers</option></select>
        </div>
        <div class="field-inline">
          <label for="f-status">Status</label>
          <select class="rmis-select" id="f-status">
            <option value="">All statuses</option>
            <option>Draft</option><option>Sent</option>
            <option>Partially Received</option><option>Completed</option>
          </select>
        </div>
        <div class="field-inline">
          <label for="f-from">From</label>
          <input class="rmis-input" id="f-from" type="date">
        </div>
        <div class="field-inline">
          <label for="f-to">To</label>
          <input class="rmis-input" id="f-to" type="date">
        </div>
        <div class="spacer"></div>
        <button class="btn-primary" id="btn-new">+ New Purchase Order</button>
      </div>

      <div class="card">
        <div class="card-head">Purchase orders</div>
        <table class="mock">
          <thead>
            <tr><th>PO #</th><th>Supplier</th><th>Created</th><th>By</th><th class="num">Total</th><th>Status</th><th></th></tr>
          </thead>
          <tbody id="po-body"></tbody>
        </table>
        <div class="empty-state" id="po-empty" hidden>No purchase orders match. Create one with &ldquo;New Purchase Order&rdquo;.</div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modal" hidden><div class="modal modal-wide" id="modal-card"></div></div>

  <script src="/js/rmis-modules.js"></script>
  <script src="/js/rmis-ui.js"></script>
  <script src="/js/purchase-orders.js"></script>
</body>
</html>
